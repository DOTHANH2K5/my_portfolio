<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Sky Shop</title>
    <link rel="stylesheet" href="/my_profects/project_01/assets/css/style.css">
</head>
<body>

    <header class="header">
        <a class="header__logo">AnimeSky</a>

        <nav class="header__nav">
            <div class="header__nav-item">
                <a href="#">Home</a>
            </div>
            
            <div class="header__nav-item">
                <a href="#">Products</a>
            </div>
            
            <div class="header__nav-item">
                <a href="#">Categories</a>
            </div>
           
            <div class="header__nav-item">
                <a href="#">Contact</a>
            </div>
           
        </nav>
    </header>

    <section class="hero">
        <h1>Anime Accessories Store</h1>
        <p>
            Discover cute anime keychains,
            figures and posters.
        </p>

        <button>Shop Now</button>
    </section>

    <main>

        <section class="products">

            <h2>Featured Products</h2>

            <div class="product-grid">

                <div class="product-card">
                    <img class="product-card_img" src="https://via.placeholder.com/200" alt="">
                    <h3>Anime Keychain</h3>
                    <p>¥1,200</p>
                    <!-- Buy/Add button -->
                    <div class="product-card__buttons">
                        <button class="product-card__cart-buy">Buy Now</button>
                        <button class="product-card__add-to-cart">Add to Cart</button>
                    </div>
                </div>

                <div  class="product-card">
                    <img class="product-card_img" src="https://via.placeholder.com/200" alt="">
                    <h3>Mini Figure</h3>
                    <p>¥3,500</p>
                    <!-- Buy/Add button -->
                    <div class="product-card__buttons">
                        <button class="product-card__cart-buy">Buy Now</button>
                        <button class="product-card__add-to-cart">Add to Cart</button>
                    </div>
                </div>

                <div class="product-card">
                    <img class="product-card_img" src="https://via.placeholder.com/200" alt="">
                    <h3>Anime Poster</h3>
                    <p>¥800</p>
                    <!-- Buy/Add button -->
                    <div class="product-card__buttons">
                        <button class="product-card__cart-buy">Buy Now</button>
                        <button class="product-card__add-to-cart">Add to Cart</button>
                    </div>
                </div>

            </div>

        </section>

        <section class="categories">

            <h2>Categories</h2>

            <div class="category-list">

                <div class="category">Keychains</div>
                <div class="category">Figures</div>
                <div class="category">Posters</div>
                <div class="category">Stickers</div>

            </div>

        </section>

    </main>

    <footer>
        <p>© 2026 AnimeSky Shop</p>
    </footer>

</body>
</html>
